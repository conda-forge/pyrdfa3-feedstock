{% set name = "pyrdfa3" %}
{% set version = "3.6.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0fc28ff1426af805b100aff7162db6a43fa215e37f92bce9b113b465feb563ea

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=71.1.0
    - pip
  run:
    - python >={{ python_min }}
    - requests >=2.32.3
    - rdflib >=7.0.0
    - html5lib >=1.1

test:
  imports:
    - pyRdfa
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/prrvchr/pyrdfa3/
  summary: pyRdfa distiller/parser library
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
